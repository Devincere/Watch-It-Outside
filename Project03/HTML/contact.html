<!DOCTYPE html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/Style/style.css" />

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" id="tab-icon" href="/Assets/film-solid-2.png" />
    <title>Watch it outside - Contact us</title>
  </head>
  <body>
    <!-- NavBbar/Header -->

    <header class="navbar navbar-expand-md main-nav">
      <div class="container-fluid">
        <div class="col-md-4 text-center mx-auto" id="header-title">
          <a href="/index.html" class="navbar-brand"
            ><i class="fas fa-film"></i> Watch it outside</a
          >
        </div>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#header-tabs"
        >
          <i class="fas fa-bars navbar-toggler-logo"></i>
        </button>

        <div class="col-md-8 collapse navbar-collapse" id="header-tabs">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a href="/index.html" class="nav-link text-light">Home</a>
            </li>
            <li class="nav-item">
              <a href="/HTML/reservation.html" class="nav-link text-light"
                >Reservation</a
              >
            </li>
            <li class="nav-item">
              <a href="#Contact" class="nav-link text-light">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <!-- Contact Form -->
    <div class="container-fluid contact-form-body py-5">
      <div class="container-fluid py-3">
        <div class="row justify-content-center">
          <div class="col-12 text-center">
            <h3 class="form-label contact-form-label">Contact form</h3>
          </div>
        </div>
      </div>
      <div class="container-fluid py-auto">
        <div class="row justify-content-center">
          <div class="col-4">
            <div class="mb-3">
              <label
                for="exampleFormControlInput1"
                class="form-label contact-form-label"
                >First name</label
              >
              <input
                type="name"
                class="form-control contact-form"
                id="exampleFormControlInput1"
                placeholder="john"
              />
            </div>
          </div>
          <div class="col-4">
            <div class="mb-3">
              <label
                for="exampleFormControlInput1"
                class="form-label contact-form-label"
                >Last name</label
              >
              <input
                type="name"
                class="form-control contact-form"
                id="exampleFormControlInput1"
                placeholder="Smith"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="container-fluid py-auto">
        <div class="row justify-content-center">
          <div class="col-8">
            <div class="mb-3">
              <label
                for="exampleFormControlInput1"
                class="form-label contact-form-label"
                >Phone Number</label
              >
              <input
                type="phone"
                class="form-control contact-form"
                id="exampleFormControlInput1"
                placeholder="555 555 5555"
              />
            </div>
            <div class="mb-3">
              <label
                for="exampleFormControlInput1"
                class="form-label contact-form-label"
                >Email address</label
              >
              <input
                type="email"
                class="form-control contact-form"
                id="exampleFormControlInput1"
                placeholder="name@example.com"
              />
            </div>
            <div class="mb-3">
              <label
                for="exampleFormControlTextarea1"
                class="form-label contact-form-label"
                >Message</label
              >
              <textarea
                class="form-control contact-form"
                id="Message"
                rows="3"
              ></textarea>
            </div>
          </div>
        </div>
      </div>
      <div class="container-fluid py-5">
        <div class="row justify-content-center">
          <div class="col-12 text-center">
            <button type="submit" class="btn btn-form contact-form">
              Submit
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Footer -->
    <footer class="container-fluid">
      <div class="row justify-content-sm-center" id="social-network">
        <div class="col col-sm-1 col-md-2 text-center my-2">
          <a href="https://www.facebook.com/" target="_blank" class="social">
            <i class="fab fa-facebook-f"></i>
          </a>
        </div>
        <div class="col col-sm-1 col-md-2 text-center my-2">
          <a href="https://www.twitter.com/" target="_blank" class="social">
            <i class="fab fa-twitter"></i>
          </a>
        </div>
        <div class="col col-sm-1 col-md-2 text-center my-2">
          <a href="https://www.instagram.com/" target="_blank" class="social">
            <i class="fab fa-instagram"></i>
          </a>
        </div>
        <div class="col col-sm-1 col-md-2 text-center my-2">
          <a href="https://www.linkedin.com/" target="_blank" class="social">
            <i class="fab fa-linkedin"></i>
          </a>
        </div>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
